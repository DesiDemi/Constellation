<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Labs: Research Divisions</title>
<style>
  :root {
    --bg: #1a1d23; --panel: rgba(26, 29, 35, 0.96);
    --border: rgba(255,255,255,0.08); --accent: #5b9bd5;
    --gold: #f0c040; --compute: #4fc3f7; --funding: #81c784;
    --traindata: #ce93d8; --danger: #ef5350; --success: #66bb6a;
    --text: #d5d5d5; --text-dim: #888; --warm-white: #f5f0e8;
    --wood: #8d6e63; --carpet: #3e4a5a; --desk: #5d4037;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; height:100vh; overflow:hidden; user-select:none; }
  canvas { position:fixed; top:0; left:0; z-index:0; }

  #ui { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; }

  #topbar {
    display:flex; align-items:center; gap:10px;
    padding:8px 14px; background:var(--panel);
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  #topbar h1 { font-size:18px; font-weight:700; color:var(--accent); letter-spacing:1px; }
  #topbar .divider { width:1px; height:20px; background:var(--border); margin:0 4px; }
  .team-badge {
    background:var(--accent); color:white; padding:3px 10px;
    border-radius:12px; font-size:11px; font-weight:700;
    white-space:nowrap;
  }
  #music-btn {
    background:transparent; border:1px solid var(--border);
    color:white; font-size:14px; padding:3px 7px; border-radius:6px;
    cursor:pointer; transition:all 0.2s;
  }
  #music-btn:hover { border-color:var(--accent); }
  .resource {
    display:flex; align-items:center; gap:4px;
    background:rgba(255,255,255,0.03); padding:4px 10px;
    border-radius:14px; font-size:12px; font-weight:600;
  }
  .resource .icon { font-size:14px; }
  #day-counter { margin-left:auto; font-size:11px; color:var(--text-dim); }
  #ach-btn {
    background:transparent; border:1px solid var(--border);
    color:var(--gold); font-size:14px; padding:3px 7px; border-radius:6px;
    cursor:pointer; transition:all 0.2s;
  }
  #ach-btn:hover { border-color:var(--gold); }

  #main { display:flex; flex:1; min-height:0; }

  #left-panel {
    width:290px; min-width:290px; padding:10px;
    background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; gap:8px; overflow-y:auto;
  }
  .section-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--text-dim); font-weight:600; margin-top:2px; }
  .project-card {
    background:rgba(255,255,255,0.02); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; gap:8px;
  }
  .project-card:hover:not(.disabled) { background:rgba(91,155,213,0.08); border-color:var(--accent); }
  .project-card.disabled { opacity:0.35; cursor:not-allowed; }
  .project-card .p-icon { font-size:22px; }
  .project-card .p-info { flex:1; }
  .project-card .p-name { font-weight:700; font-size:13px; }
  .project-card .p-meta { font-size:10px; color:var(--text-dim); display:flex; gap:10px; }
  .project-card .p-bar { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; margin-top:3px; }
  .project-card .p-bar-fill { height:100%; background:var(--success); border-radius:2px; transition:width 1s linear; }

  #right-panel {
    width:320px; min-width:320px; padding:10px;
    background:var(--panel); border-left:1px solid var(--border);
    display:flex; flex-direction:column; gap:8px; overflow-y:auto;
  }
  .tab-row { display:flex; gap:3px; }
  .tab-btn {
    flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border);
    color:var(--text-dim); padding:5px 4px; border-radius:6px;
    font-size:10px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s;
  }
  .tab-btn:hover { color:white; border-color:var(--accent); }
  .tab-btn.active { color:white; border-color:var(--accent); background:rgba(91,155,213,0.15); }
  .tab-content { display:none; flex-direction:column; gap:6px; }
  .tab-content.active { display:flex; }

  .card {
    background:rgba(255,255,255,0.02); border:1px solid var(--border);
    border-radius:7px; padding:7px 9px; display:flex; align-items:center;
    gap:7px; cursor:pointer; transition:all 0.15s;
  }
  .card:hover:not(.locked) { background:rgba(255,255,255,0.04); border-color:var(--accent); }
  .card.locked { opacity:0.3; cursor:not-allowed; }
  .card.hired { border-color:var(--success); }
  .card-icon { font-size:20px; min-width:26px; text-align:center; }
  .card-info { flex:1; }
  .card-name { font-weight:700; font-size:12px; }
  .card-desc { font-size:9px; color:var(--text-dim); }

  button {
    background:var(--accent); color:white; border:none;
    padding:5px 12px; border-radius:5px; font-weight:700;
    font-size:10px; cursor:pointer; transition:all 0.15s;
  }
  button:hover { filter:brightness(1.15); transform:scale(1.03); }
  button:disabled { opacity:0.3; cursor:not-allowed; transform:none; filter:none; }
  button.small { padding:3px 8px; font-size:9px; }
  button.secondary { background:transparent; border:1px solid var(--accent); color:var(--accent); }
  button.danger { background:var(--danger); }

  #center-panel { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
  #office-label {
    position:absolute; bottom:12px;
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:10px 16px; text-align:center;
    pointer-events:none;
  }
  #office-label h3 { font-size:14px; color:var(--accent); margin-bottom:2px; }
  #office-label p { font-size:10px; color:var(--text-dim); }

  #interact-hint {
    position:fixed; bottom:50px; left:50%; transform:translateX(-50%);
    font-size:10px; color:var(--text-dim); pointer-events:none;
    z-index:2; opacity:0; transition:opacity 0.5s;
  }

  #log-area {
    position:fixed; bottom:40px; left:310px; right:340px;
    max-height:80px; overflow-y:auto; pointer-events:none; z-index:2;
  }
  .log-entry {
    font-size:10px; padding:1px 0; color:var(--text-dim);
    animation:fadeUp 3.5s forwards; text-align:center;
  }
  @keyframes fadeUp {
    0% { opacity:1; transform:translateY(0); } 75% { opacity:0.4; } 100% { opacity:0; transform:translateY(-12px); }
  }
  .log-entry.good { color:var(--success); }
  .log-entry.discovery { color:var(--gold); }
  .log-entry.danger { color:var(--danger); }

  #toast {
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--gold);
    color:var(--gold); padding:8px 20px; border-radius:16px;
    font-weight:700; z-index:5; pointer-events:none;
    animation:toastPop 2.5s forwards; display:none;
  }
  @keyframes toastPop {
    0% { opacity:0; transform:translateX(-50%) translateY(8px); }
    15% { opacity:1; transform:translateX(-50%) translateY(0); }
    80% { opacity:1; } 100% { opacity:0; transform:translateX(-50%) translateY(-8px); }
  }

  #event-overlay {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.8); z-index:8;
    display:none; align-items:center; justify-content:center;
  }
  #event-card {
    background:var(--panel); border:2px solid var(--danger);
    border-radius:14px; padding:20px; max-width:400px;
    text-align:center; animation:slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  #event-card h3 { font-size:18px; color:var(--danger); margin-bottom:8px; }
  #event-card p { font-size:12px; color:var(--text-dim); margin-bottom:14px; line-height:1.4; }
  .event-choices { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }

  #team-popup {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.85); z-index:9;
    display:none; align-items:center; justify-content:center;
  }
  #team-popup .card {
    background:var(--panel); border:2px solid var(--accent);
    border-radius:16px; padding:28px; max-width:440px;
    text-align:center; animation:slideIn 0.4s ease;
    flex-direction:column; align-items:center; gap:14px;
  }
  #team-popup h2 { font-size:22px; color:var(--accent); }
  #team-popup .big-icon { font-size:64px; }

  #ach-overlay {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.8); z-index:8;
    display:none; align-items:center; justify-content:center;
  }
  #ach-card {
    background:var(--panel); border:1px solid var(--gold);
    border-radius:14px; padding:20px; max-width:420px; max-height:75vh;
    overflow-y:auto; animation:slideIn 0.3s ease;
  }
  #ach-card h3 { text-align:center; color:var(--gold); font-size:18px; margin-bottom:8px; }
  .ach-row {
    display:flex; align-items:center; gap:8px; padding:6px 8px;
    border-radius:6px; background:rgba(255,255,255,0.02); border:1px solid var(--border);
    margin-bottom:4px;
  }
  .ach-row.earned { border-color:var(--success); }

  /* Division entries */
  .division-card {
    background:rgba(91,155,213,0.05); border:1px solid var(--border);
    border-radius:8px; padding:8px; margin-bottom:4px;
  }
  .division-card .div-name { font-weight:700; font-size:12px; color:var(--accent); }
  .division-card .div-meta { font-size:9px; color:var(--text-dim); margin-top:2px; }
</style>
</head>
<body>
<audio id="bgm" loop preload="auto"><source src="Dop Dip Dup.mp3" type="audio/mpeg"></audio>
<canvas id="canvas"></canvas>

<div id="team-popup" onclick="if(event.target===this)dismissTeamPopup()">
  <div class="card">
    <div class="big-icon" id="popup-icon">🎉</div>
    <h2 id="popup-title">Team Complete!</h2>
    <p id="popup-desc" style="color:var(--text-dim);line-height:1.5;"></p>
    <button onclick="dismissTeamPopup()">Start New Team 🚀</button>
  </div>
</div>

<div id="event-overlay">
  <div id="event-card"><h3 id="event-title"></h3><p id="event-desc"></p><div class="event-choices" id="event-choices"></div></div>
</div>

<div id="ach-overlay" onclick="if(event.target===this)toggleAchievements()">
  <div id="ach-card"><h3>🏆 Achievements</h3><div id="ach-list"></div><button onclick="toggleAchievements()" class="secondary" style="margin-top:6px;">Close</button></div>
</div>

<div id="ui">
  <div id="topbar">
    <h1>🏢 STAR LABS</h1>
    <span class="team-badge" id="team-badge">Team Alpha</span>
    <span class="divider"></span>
    <button id="music-btn" title="Toggle Music" onclick="toggleMusic()">🔊</button>
    <div class="resource" style="color:#4fc3f7;"><span class="icon">⚡</span><span id="res-compute">50</span><span class="rate" id="rate-compute">+1/s</span></div>
    <div class="resource" style="color:#81c784;"><span class="icon">💰</span><span id="res-funding">200</span></div>
    <div class="resource" style="color:#ce93d8;"><span class="icon">📊</span><span id="res-traindata">0</span></div>
    <span class="divider"></span>
    <button id="ach-btn" title="Achievements" onclick="toggleAchievements()">🏆 <span id="ach-count">0/20</span></button>
    <div id="day-counter">Day 1</div>
    <div class="resource" style="color:#ef5350;gap:3px;"><span class="icon">🔒</span><span id="res-integrity">100</span>/<span id="res-maxintegrity">100</span></div>
  </div>
  <div id="main">
    <div id="left-panel">
      <div class="section-title">📋 AI PROJECTS</div>
      <div id="project-list"></div>
      <div class="section-title" style="margin-top:4px;">🧠 MODEL ZOO (<span id="catalog-count">0</span>/12)</div>
      <div id="star-catalog"></div>
    </div>
    <div id="center-panel">
      <div id="office-label"><h3 id="office-name">Your Office</h3><p id="office-desc">Team Alpha | 0/6 members</p></div>
    </div>
    <div id="right-panel">
      <div class="tab-row">
        <div class="tab-btn active" onclick="switchTab('infra')">🏗️ Infra</div>
        <div class="tab-btn" onclick="switchTab('team')">👥 Team</div>
        <div class="tab-btn" onclick="switchTab('papers')">📄 Papers</div>
        <div class="tab-btn" onclick="switchTab('security')">🛡️ Security</div>
        <div class="tab-btn" onclick="switchTab('divisions')">🏢 Divisions</div>
      </div>
      <div class="tab-content active" id="tab-infra"></div>
      <div class="tab-content" id="tab-team"></div>
      <div class="tab-content" id="tab-papers"></div>
      <div class="tab-content" id="tab-security"></div>
      <div class="tab-content" id="tab-divisions"></div>
      <div id="combat-overlay" style="display:none;flex-direction:column;gap:6px;background:rgba(239,83,80,0.05);border:2px solid var(--danger);border-radius:10px;padding:10px;margin-top:6px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span id="alien-icon" style="font-size:24px;">🐛</span>
          <div style="flex:1;">
            <div style="font-weight:700;color:var(--danger);font-size:12px;" id="alien-name">Bug</div>
            <div style="width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-top:3px;"><div id="alien-hp-bar" style="height:100%;background:var(--danger);border-radius:3px;width:100%;"></div></div>
          </div>
        </div>
        <button onclick="attackAlien()" id="attack-btn" class="danger" style="font-size:11px;">🛡️ Patch! (<span id="attack-dmg">10</span>)</button>
        <div style="font-size:9px;color:var(--text-dim);text-align:center;" id="alien-threat"></div>
      </div>
    </div>
  </div>
</div>
<div id="log-area"></div>
<div id="toast"></div>
<div id="interact-hint">Click desks and monitors for bonus compute! 🖱️</div>

<script>
// ==================== DATA ====================
const TEAM_NAMES = ['Alpha','Beta','Gamma','Delta','Epsilon','Zeta','Eta','Theta','Iota','Kappa'];

const STAR_TYPES = [
  { name:'Linear Regression', icon:'📈', rarity:'Common', data:8, credits:15 },
  { name:'Decision Tree', icon:'🌳', rarity:'Common', data:10, credits:20 },
  { name:'Random Forest', icon:'🌲', rarity:'Uncommon', data:18, credits:35 },
  { name:'Support Vector Machine', icon:'🎯', rarity:'Uncommon', data:22, credits:40 },
  { name:'Convolutional NN', icon:'👁️', rarity:'Rare', data:35, credits:60 },
  { name:'LSTM Network', icon:'🔄', rarity:'Rare', data:45, credits:75 },
  { name:'Transformer', icon:'⚡', rarity:'Very Rare', data:60, credits:100 },
  { name:'GAN', icon:'🎨', rarity:'Very Rare', data:70, credits:120 },
  { name:'Diffusion Model', icon:'🌌', rarity:'Legendary', data:100, credits:200 },
  { name:'Mixture of Experts', icon:'🧩', rarity:'Legendary', data:90, credits:180 },
  { name:'RL Agent', icon:'🎮', rarity:'Rare', data:50, credits:90 },
  { name:'Foundation Model', icon:'🧠', rarity:'Legendary', data:110, credits:220 },
];

const PROJECTS = [
  { id:'small_exp', name:'Small Experiment', dur:7, cost:5, risk:'Low', icon:'🧪' },
  { id:'fine_tune', name:'Model Fine-Tuning', dur:13, cost:12, risk:'Low', icon:'🔧' },
  { id:'arch_search', name:'Architecture Search', dur:25, cost:25, risk:'Medium', icon:'🔍' },
  { id:'large_train', name:'Large Training Run', dur:42, cost:45, risk:'Medium', icon:'🏋️' },
  { id:'multi_agent', name:'Multi-Agent System', dur:65, cost:70, risk:'High', icon:'🤖' },
  { id:'foundation', name:'Foundation Model', dur:100, cost:110, risk:'High', icon:'🏛️' },
  { id:'agi_research', name:'AGI Research', dur:140, cost:170, risk:'Very High', icon:'🧬' },
  { id:'super_intel', name:'Superintelligence Proto', dur:200, cost:250, risk:'Extreme', icon:'💡' },
];

const MODULES = [
  { id:'gpu', name:'GPU Cluster', icon:'🖥️', cost:50, scale:1.55, max:10, desc:l=>`+${l} compute/s` },
  { id:'lab', name:'AI Lab', icon:'🧪', cost:80, scale:1.65, max:8, desc:l=>`Research ${l*12}% faster` },
  { id:'crawler', name:'Data Crawler', icon:'🕷️', cost:100, scale:1.7, max:8, desc:l=>`+${l*8}% rare models` },
  { id:'tpu', name:'TPU Pod', icon:'⚡', cost:300, scale:1.95, max:5, desc:l=>`+${l*5} compute/s` },
  { id:'firewall', name:'Security Layer', icon:'🛡️', cost:150, scale:1.7, max:6, desc:l=>`-${l*5}% risk` },
  { id:'debugger', name:'Auto-Debugger', icon:'🐛', cost:200, scale:1.8, max:4, desc:l=>`${l*12}% salvage` },
  { id:'quantum', name:'Quantum Lab', icon:'💠', cost:500, scale:2.2, max:4, desc:l=>`+${l*8}% yields` },
];

const RESEARCH = [
  { id:'eff_gpu', name:'Efficient Architectures', cost:25, req:null, desc:'GPU +30% output' },
  { id:'adv_mining', name:'Advanced Data Mining', cost:50, req:'eff_gpu', desc:'Crawler +15% eff' },
  { id:'dist_train', name:'Distributed Training', cost:70, req:'adv_mining', desc:'Projects 20% faster' },
  { id:'automl', name:'AutoML Pipeline', cost:85, req:'adv_mining', desc:'Lab +30%' },
  { id:'unsupervised', name:'Unsupervised Learning', cost:130, req:'dist_train', desc:'+3 comp/s, +10% funding' },
  { id:'federated', name:'Federated Learning', cost:160, req:'automl', desc:'+1 model/project' },
  { id:'neuromorphic', name:'Neuromorphic Computing', cost:220, req:'unsupervised', desc:'TPU +100%' },
  { id:'multimodal', name:'Multimodal AI', cost:260, req:'federated', desc:'Double data from discoveries' },
  { id:'transfer', name:'Transfer Learning', cost:300, req:'neuromorphic', desc:'Projects 30% faster' },
  { id:'predictive', name:'Predictive Analytics', cost:350, req:'multimodal', desc:'+25% legendary chance' },
];

const CREW = [
  { id:'ml_researcher', name:'ML Researcher', icon:'👩‍💻', cost:80, desc:'+20% data, +15% lab speed' },
  { id:'devops', name:'DevOps Engineer', icon:'⚙️', cost:100, desc:'+25% compute, -15% costs' },
  { id:'pm', name:'Project Manager', icon:'📋', cost:120, desc:'+15% success, +10% speed' },
  { id:'senior_dev', name:'Senior Developer', icon:'👨‍💻', cost:140, desc:'+20% funding' },
  { id:'data_scientist', name:'Data Scientist', icon:'📈', cost:180, desc:'+30% discoveries' },
  { id:'research_lead', name:'Research Lead', icon:'🎓', cost:200, desc:'+40% data, -20% paper cost' },
];

const EVENTS = [
  { title:'🔌 Power Outage!', desc:'Data center lost power!', choices:[
    { text:'Divert backup (-30 comp)', cost:{compute:30}, good:true },
    { text:'Let systems hibernate', cost:{}, good:false },
  ]},
  { title:'📡 Anomalous Data', desc:'Unusual patterns in training data!', choices:[
    { text:'Investigate (-20 comp)', cost:{compute:20}, good:true, reward:{data:40} },
    { text:'Ignore', cost:{}, good:false },
  ]},
  { title:'🌡️ GPU Overheating', desc:'Temperatures spiking!', choices:[
    { text:'Emergency cooling (-50 fund)', cost:{funding:50}, good:true },
    { text:'Throttle (-30 comp)', cost:{}, good:false, penalty:{compute:30} },
  ]},
  { title:'💾 Data Breach', desc:'Unauthorized access detected!', choices:[
    { text:'Countermeasures (-15 comp)', cost:{compute:15}, good:true, reward:{funding:60} },
    { text:'Lock systems', cost:{}, good:false },
  ]},
  { title:'✨ Breakthrough Window', desc:'Rare insight moment!', choices:[
    { text:'Full sprint (-40 comp)', cost:{compute:40}, good:true, reward:{data:80,extraModels:2} },
    { text:'Standard (-10 comp)', cost:{compute:10}, good:false, reward:{data:20} },
  ]},
  { title:'🌐 DDoS Attack', desc:'Massive DDoS!', choices:[
    { text:'Ride it out', cost:{}, good:false },
    { text:'Activate CDN (-45 comp)', cost:{compute:45}, good:true, reward:{data:25} },
  ]},
];

const ACHIEVEMENTS = [
  { id:'first_project', name:'First Commit', desc:'Launch first project', icon:'🚀', check:()=>S.totalProjects>=1 },
  { id:'ten_projects', name:'Veteran', desc:'Complete 10 projects', icon:'🏅', check:()=>S.successful>=10 },
  { id:'fifty_projects', name:'Director', desc:'Complete 50 projects', icon:'🎖️', check:()=>S.successful>=50 },
  { id:'first_model', name:'Hello World', desc:'Develop first model', icon:'🧠', check:()=>S.stars.length>=1 },
  { id:'five_models', name:'Collector', desc:'5 model types', icon:'📚', check:()=>S.stars.length>=5 },
  { id:'all_models', name:'Encyclopedia', desc:'All 12 models', icon:'🏛️', check:()=>S.stars.length>=12 },
  { id:'rich', name:'Well Funded', desc:'1000 funding', icon:'💰', check:()=>S.credits>=1000 },
  { id:'first_kill', name:'Bug Squasher', desc:'Defeat first threat', icon:'🐛', check:()=>S.aliensDefeated>=1 },
  { id:'first_team', name:'Team Builder', desc:'Form your first team', icon:'👥', check:()=>S.teams.length>=1 },
  { id:'three_teams', name:'Division Head', desc:'Build 3 teams', icon:'🏢', check:()=>S.teams.length>=3 },
  { id:'five_teams', name:'Lab Director', desc:'Build 5 teams', icon:'🏛️', check:()=>S.teams.length>=5 },

// ==================== CANVAS (OFFICE) ====================
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let deskLights=[],officePeople=[];
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);

// Office desks (interactive click targets)
const desks=[];
for(let row=0;row<5;row++){
  for(let col=0;col<6;col++){
    desks.push({x:150+col*160+Math.random()*40,y:80+row*120+Math.random()*30,w:70,h:45,monitorOn:false,id:row*6+col});
  }
}
for(let i=0;i<40;i++) deskLights.push({x:Math.random()*2000-100,y:Math.random()*1200-50,r:Math.random()*1.2+0.3,phase:Math.random()*Math.PI*2});
for(let i=0;i<8;i++) officePeople.push({desk:Math.floor(Math.random()*desks.length),phase:Math.random()*Math.PI*2});

function drawOffice(cx,cy,scale){
  ctx.save(); ctx.translate(cx,cy); ctx.scale(scale,scale);

  // Floor / carpet
  ctx.fillStyle='#3a4555'; ctx.fillRect(-150,-100,300,200);
  for(let x=-150;x<150;x+=20){
    for(let y=-100;y<100;y+=20){
      ctx.fillStyle=(Math.floor((x+150)/20)+Math.floor((y+100)/20))%2===0?'#3d4859':'#374353';
      ctx.fillRect(x,y,20,20);
    }
  }

  // Walls
  ctx.fillStyle='#4a5568'; ctx.fillRect(-150,-100,300,8); // top wall
  ctx.fillStyle='#505b6e'; ctx.fillRect(-150,-100,8,200); // left wall
  ctx.fillRect(142,-100,8,200); // right wall

  // Desks
  desks.forEach((d,i)=>{
    const sx=cx+(d.x-150)*scale, sy=cy+(d.y-100)*scale;
    // Draw at world space
  });
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#1a1d23'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const t=Date.now()/1000;

  // Office ceiling lights
  deskLights.forEach(l=>{ const a=0.15+Math.sin(t*0.7+l.phase)*0.08; ctx.fillStyle=`rgba(255,240,220,${a})`; ctx.beginPath(); ctx.arc(l.x,l.y,l.r,0,Math.PI*2); ctx.fill(); });

  const sx=canvas.width*0.5, sy=canvas.height*0.45, s=2.2;
  // Draw floor
  ctx.save(); ctx.translate(sx,sy); ctx.scale(s,s);
  ctx.fillStyle='#3e4a5a'; ctx.fillRect(-180,-120,360,240);
  for(let x=-180;x<180;x+=24){ for(let y=-120;y<120;y+=24){ ctx.fillStyle=(Math.floor((x+180)/24)+Math.floor((y+120)/24))%2===0?'#414d5e':'#3b4758'; ctx.fillRect(x,y,24,24); } }
  ctx.fillStyle='#4a5568'; ctx.fillRect(-180,-120,360,8);
  ctx.fillStyle='#505b6e'; ctx.fillRect(-180,-116,8,236);
  ctx.fillRect(172,-116,8,236);

  // Draw desks with monitors
  desks.forEach(d=>{
    const dx=d.x-150,dy=d.y-100;
    // Desk surface
    ctx.fillStyle='#5d4037'; ctx.fillRect(dx-32,dy-18,64,36);
    ctx.fillStyle='#6d4c41'; ctx.fillRect(dx-30,dy-16,60,32);
    // Monitor
    ctx.fillStyle='#333'; ctx.fillRect(dx-14,dy-28,28,14);
    ctx.fillStyle=d.monitorOn?'#4fc3f7':'#1a1a1a'; ctx.fillRect(dx-12,dy-26,24,10);
    if(d.monitorOn){ ctx.fillStyle='rgba(79,195,247,0.3)'; ctx.fillRect(dx-12,dy-26,24,4); }
    // Chair
    ctx.fillStyle='#424242'; ctx.beginPath(); ctx.ellipse(dx,dy+26,16,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#333'; ctx.fillRect(dx-2,dy+10,4,16);
    // Keyboard
    ctx.fillStyle='#222'; ctx.fillRect(dx-10,dy-2,20,5);
  });

  // People at desks
  officePeople.forEach(p=>{
    const d=desks[p.desk%desks.length];
    if(!d) return;
    const b=Math.sin(t*1.5+p.phase)*2;
    ctx.fillStyle='#e8c9a0'; ctx.beginPath(); ctx.arc(d.x-150+b,d.y-120,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#555'; ctx.fillRect(d.x-153+b,d.y-115,6,10);
  });

  // Your desk (highlighted — center)
  ctx.strokeStyle='rgba(91,155,213,0.6)'; ctx.lineWidth=2; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.roundRect(-40,-22,80,58,8); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='rgba(91,155,213,0.08)'; ctx.fillRect(-40,-22,80,58);

  // Ships = active projects orbiting your desk
  S.projects.forEach((p,i)=>{
    if(p.progress>=p.max) return;
    const ang=(i/Math.max(S.projects.length,1))*Math.PI*2+t*0.3;
    const dist=70+i*16;
    const px=Math.cos(ang)*dist, py=Math.sin(ang)*dist*0.5;
    ctx.save(); ctx.translate(px,py); ctx.rotate(ang+Math.PI/2);
    ctx.fillStyle='#81c784'; ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(-2,3); ctx.lineTo(2,3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,7,-Math.PI/2,-Math.PI/2+(p.progress/p.max)*Math.PI*2); ctx.strokeStyle='rgba(129,199,132,0.6)'; ctx.lineWidth=1.2; ctx.stroke();
    ctx.restore();
  });

  // Threat (hacker)
  if(S.currentAlien){
    const a=S.currentAlien; a.x-=a.speed; if(a.x<sx/s+80) a.x=sx/s+80;
    ctx.save(); ctx.translate(a.x,a.y); const bob=Math.sin(t*4)*2;
    ctx.fillStyle='#ef5350'; ctx.beginPath(); ctx.ellipse(0,bob,18,10,0,0,Math.PI*2); ctx.fill();
    const hpPct=a.hp/a.maxHp; ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-16,bob-20,32,4); ctx.fillStyle='#ef5350'; ctx.fillRect(-16,bob-20,32*hpPct,4);
    ctx.fillStyle='white'; ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.fillText(a.name,0,bob-24);
    ctx.restore();
    // Laser
    if(S.modules.laser>0){ ctx.strokeStyle='rgba(100,200,255,0.6)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(a.x*s-22*s,a.y*s-sy); ctx.stroke(); }
  }

  ctx.restore();

  requestAnimationFrame(draw);
}
draw();

// Interactive: click desks to toggle monitors (bonus compute)
canvas.addEventListener('click',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const sx=canvas.width*0.5, sy=canvas.height*0.45, s=2.2;
  desks.forEach(d=>{
    const dx=(d.x-150)*s+sx, dy=(d.y-100)*s+sy;
    if(mx>dx-32&&mx<dx+32&&my>dy-30&&my<dy+30){
      d.monitorOn=!d.monitorOn;
      if(d.monitorOn){ S.energy+=2; addLog('🖥️ Monitor turned on! +2 compute','good'); }
    }
  });
  // Check if clicked on enemy
  if(S.currentAlien){
    const a=S.currentAlien, ax=a.x*s, ay=a.y*s;
    if(Math.hypot(mx-ax,my-ay)<30){ attackAlien(); }
  }
});

function checkTeamComplete(){
  if(teamMemberCount()>=6){

    S.teams.push({name,members:[...S.crew],projectsCompleted:S.successful});
    S.crew=[]; S.teamIndex++;

function dismissTeamPopup(){ document.getElementById('team-popup').style.display='none'; updateUI(); }

// ==================== GAME ACTIONS ====================
let expCounter=0;
function launchProject(proj){
  if(S.projects.filter(p=>p.progress<p.max).length>=6||S.energy<proj.cost) return;
  S.energy-=proj.cost; S.totalProjects++;
  let dur=proj.dur; if(S.research.includes('dist_train')) dur=Math.floor(dur*0.8); if(S.research.includes('transfer')) dur=Math.floor(dur*0.7);
  const pm=teamMemberCount()>3?0.1:0;
  dur=Math.floor(dur*(1-pm));
  const extraStars=S.research.includes('federated')?1:0;
  S.projects.push({proj,progress:0,max:dur,extraStars,id:`${proj.id}_${++expCounter}`});
  addLog(`Project launched: ${proj.name}`,''); updateUI();
}

function completeProject(p){
  const idx=S.projects.indexOf(p); if(idx>=0) S.projects.splice(idx,1);
  if(p.proj.id==='super_intel') S.voidLeaps++;
  const baseRisk={Low:0.85,Medium:0.7,High:0.55,'Very High':0.4,Extreme:0.25}[p.proj.risk]||0.7;
  const successChance=baseRisk+S.modules.firewall*0.05+(S.modules.debugger*0.12);
  const succeeded=Math.random()<Math.min(0.95,successChance);
  if(succeeded){
    S.successful++; const count=Math.floor(1+Math.random()*3)+p.extraStars;
    let td=0,tc=0; count>0&&count;
    for(let i=0;i<count;i++){
      const roll=Math.random()*100; let idx;
      if(roll<5+S.modules.crawler*8) idx=Math.floor(Math.random()*3)+8;
      else if(roll<20+S.modules.crawler*5) idx=Math.floor(Math.random()*3)+5;
      else if(roll<50+S.modules.crawler*3) idx=Math.floor(Math.random()*2)+3;
      else idx=Math.floor(Math.random()*3);
      const star=STAR_TYPES[idx]; td+=star.data; tc+=star.credits;
      if(!S.stars.find(s=>s.name===star.name)){ S.stars.push(star); showToast(`🧠 ${star.name}!`); addLog(`Developed: ${star.icon} ${star.name} (${star.rarity})`,'discovery'); }
    }
    if(S.research.includes('multimodal')) td*=2;
    const qm=1+S.modules.quantum*0.08; td=Math.floor(td*qm); tc=Math.floor(tc*qm);
    S.data+=td; S.credits+=tc;
    addLog(`✅ ${p.proj.name}: +${td} data, +${tc} funding`,'good');
  } else { S.failed++; addLog(`❌ ${p.proj.name} failed`,'danger'); }
  checkAchievements(); updateUI();
}

function buyModule(mod){
  const lvl=S.modules[mod.id]; let cost=Math.floor(mod.cost*Math.pow(mod.scale,lvl));
  if(S.credits<cost||lvl>=mod.max) return; S.credits-=cost; S.modules[mod.id]++;
  addLog(`Upgraded ${mod.name} → Lv.${S.modules[mod.id]}`,'good'); checkAchievements(); updateUI();
}

function researchTech(res){
  if(S.data<res.cost||S.research.includes(res.id)) return; if(res.req&&!S.research.includes(res.req)) return;
  let cost=res.cost;
  S.data-=cost; S.research.push(res.id);
  showToast(`📄 Published: ${res.name}!`); addLog(`Published: ${res.name} — ${res.desc}`,'discovery'); checkAchievements(); updateUI();
}

function hireCrew(c){ if(teamMemberCount()>=6||S.credits<c.cost) return; S.credits-=c.cost; S.crew.push(c); addLog(`Hired ${c.icon} ${c.name}! (${teamMemberCount()}/6)`,'good'); checkTeamComplete(); checkAchievements(); updateUI(); }
function fireCrew(type){ const i=S.crew.findIndex(c=>c.id===type); if(i<0) return; S.crew.splice(i,1); addLog('Member released.',''); updateUI(); }

// ==================== COMBAT ====================
let combatTimer=null;
function spawnAlien(){
  if(S.currentAlien) return; let mx=0; if(S.day>5) mx=1; if(S.day>15) mx=2; if(S.day>30) mx=3;
  const at=ALIENS[Math.floor(Math.random()*(mx+1))];
  S.currentAlien={type:at,hp:at.hp,maxHp:at.hp,name:at.name,icon:at.icon,damage:at.damage,reward:at.reward,atkSpeed:at.atkSpeed,speed:at.speed,x:canvas.width*0.7/2.2,y:-30+Math.random()*20,attackTimer:0};
  showToast(`⚠️ ${at.icon} ${at.name} detected!`); addLog(`🚨 ${at.icon} ${at.name} attacking!`,'danger'); updateCombatUI();
}
function attackAlien(){
  if(!S.currentAlien) return; const dmg=10+S.modules.cannon*8;
  S.currentAlien.hp-=dmg; addLog(`🛡️ Patched for ${dmg} dmg!`,'');
  if(S.currentAlien.hp<=0) defeatAlien(); updateCombatUI();
}
function defeatAlien(){
  const a=S.currentAlien; S.aliensDefeated++; if(a.type.id==='zero_day') S.mothershipsDefeated++;
  S.credits+=a.reward.credits||0; S.data+=a.reward.data||0;
  showToast(`✅ ${a.name} neutralized!`); addLog(`✅ ${a.name} patched! +${a.reward.credits}💰`,'good');
  if(Math.random()<0.25){ const s=STAR_TYPES[Math.floor(Math.random()*12)]; if(!S.stars.find(x=>x.name===s.name)){ S.stars.push(s); showToast(`🧠 Salvaged: ${s.name}!`); } }
  S.currentAlien=null; document.getElementById('combat-overlay').style.display='none'; scheduleAlien(); checkAchievements(); updateUI();
}
function updateCombatUI(){
  if(!S.currentAlien) return; const a=S.currentAlien;
  document.getElementById('combat-overlay').style.display='flex'; document.getElementById('alien-icon').textContent=a.icon; document.getElementById('alien-name').textContent=a.name;
  document.getElementById('alien-hp-bar').style.width=(a.hp/a.maxHp*100)+'%';
  document.getElementById('attack-dmg').textContent=10+S.modules.cannon*8;
  document.getElementById('alien-threat').textContent=`⚠️ Exploiting in ${Math.ceil(Math.max(0,a.atkSpeed-a.attackTimer))}s for ${a.damage}dmg`;
}
function scheduleAlien(){ if(combatTimer) clearTimeout(combatTimer); combatTimer=setTimeout(spawnAlien,40000+Math.random()*60000); }

// ==================== UI ====================
function updateUI(){
  document.getElementById('res-compute').textContent=Math.floor(S.energy);
  document.getElementById('res-funding').textContent=Math.floor(S.credits);
  document.getElementById('res-traindata').textContent=Math.floor(S.data);
  document.getElementById('day-counter').textContent=`Day ${S.day}`;
  document.getElementById('res-integrity').textContent=Math.floor(S.stationHP);
  document.getElementById('res-maxintegrity').textContent=S.maxHP;
  document.getElementById('team-badge').textContent=currentTeamName();
  document.getElementById('office-name').textContent=`${currentTeamName()} Office`;
  document.getElementById('office-desc').textContent=`${currentTeamName()} | ${teamMemberCount()}/6 members`;
  renderProjects(); renderStarCatalog(); renderInfraTab(); renderTeamTab(); renderPapersTab(); renderSecurityTab(); renderAchievements();
  document.getElementById('catalog-count').textContent=S.stars.length;
  let eGen=S.modules.gpu+S.modules.tpu*5; if(S.research.includes('unsupervised')) eGen+=3+Math.floor(S.modules.gpu*0.3); if(S.research.includes('neuromorphic')) eGen+=S.modules.tpu*5;
  document.getElementById('rate-compute').textContent=`+${Math.max(0,eGen)}/s`;
}

function renderProjects(){
  const c=document.getElementById('project-list'), active=S.projects.filter(p=>p.progress<p.max).length;
  c.innerHTML='';
  PROJECTS.forEach(proj=>{
    const can=active<6&&S.energy>=proj.cost;
    const div=document.createElement('div'); div.className='project-card'+(!can?' disabled':'');
    const activeInst=S.projects.filter(p=>p.proj.id===proj.id&&p.progress<p.max);
    let inner=`<div class="p-icon">${proj.icon}</div><div class="p-info"><div class="p-name">${proj.name}</div><div class="p-meta"><span>⏱${proj.dur}s</span><span>⚡${proj.cost}</span><span>⚠${proj.risk}</span></div>`;
    activeInst.forEach(p=>{ inner+=`<div class="p-bar"><div class="p-bar-fill" style="width:${(p.progress/p.max)*100}%"></div></div><span style="font-size:9px;color:#66bb6a">${Math.floor((p.progress/p.max)*100)}%</span>`; });
    inner+='</div>';
    div.innerHTML=inner;
    div.addEventListener('click',()=>{ if(can)launchProject(proj); }); c.appendChild(div);
  });
}

function renderStarCatalog(){
  const c=document.getElementById('star-catalog'); c.innerHTML='';
  STAR_TYPES.forEach(s=>{ const d=S.stars.some(x=>x.name===s.name); c.innerHTML+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 6px;font-size:11px;opacity:${d?1:0.3}"><span>${d?s.icon:'❓'}</span><span>${d?s.name:'???'}</span><span style="font-size:9px;color:#888;margin-left:auto">${d?s.rarity:''}</span></div>`; });
}

function renderInfraTab(){

}

function renderTeamTab(){

  CREW.forEach(cr=>{ const hired=S.crew.filter(c=>c.id===cr.id).length; const can=teamMemberCount()<6&&S.credits>=cr.cost&&hired<1; c.innerHTML+=`<div class="card${hired?' hired':''}"><div class="card-icon">${cr.icon}</div><div class="card-info"><div class="card-name">${cr.name}${hired?' <span style="color:#66bb6a">✓</span>':''}</div><div class="card-desc">${cr.desc}</div></div><div style="display:flex;gap:3px;">${can?`<button class="small" onclick="hireCrew(CREW[${CREW.indexOf(cr)}])">💰${cr.cost}</button>`:''}${hired?`<button class="small secondary" onclick="fireCrew('${cr.id}')">✕</button>`:''}</div></div>`; });
}

function renderPapersTab(){
  const c=document.getElementById('tab-papers'); c.innerHTML='';
  RESEARCH.forEach(r=>{ const done=S.research.includes(r.id); const req=r.req&&!S.research.includes(r.req); const can=!done&&!req&&S.data>=r.cost; c.innerHTML+=`<div class="card${done?' completed':req?' locked':''}"><div class="card-icon">${done?'✅':req?'🔒':'📄'}</div><div class="card-info"><div class="card-name">${r.name}</div><div class="card-desc">${r.desc}</div></div>${done?'<span style="color:#66bb6a;font-size:9px">Done</span>':req?'<span style="color:#ef5350;font-size:9px">Locked</span>':`<button class="small" ${!can?'disabled':''} onclick="researchTech(RESEARCH[${RESEARCH.indexOf(r)}])">📊${r.cost}</button>`}</div>`; });
}

function renderSecurityTab(){
  const c=document.getElementById('tab-security'); c.innerHTML='';
  DEFENSE.forEach(m=>{ const l=S.modules[m.id]; let cost=Math.floor(m.cost*Math.pow(m.scale,l)); const max=l>=m.max; c.innerHTML+=`<div class="card"><div class="card-icon">${m.icon}</div><div class="card-info"><div class="card-name">${m.name} <span style="color:#5b9bd5;font-size:9px">Lv${l}/${m.max}</span></div><div class="card-desc">${m.desc(l)}</div></div>${max?'<span style="color:#66bb6a;font-size:9px">MAX</span>':`<button class="small" ${S.credits<cost?'disabled':''} onclick="buyModule(DEFENSE[${DEFENSE.indexOf(m)}])">💰${cost}</button>`}</div>`; });
}

function renderDivisionsTab(){
  const c=document.getElementById('tab-divisions'); c.innerHTML='<div class="section-title">Autonomous Divisions</div>';
  if(S.teams.length===0){ c.innerHTML+='<div style="color:var(--text-dim);font-size:11px;padding:8px;">No autonomous divisions yet. Build a team of 6 to create one!</div>'; return; }
  S.teams.forEach((t,i)=>{ c.innerHTML+=`<div class="division-card"><div class="div-name">🏢 ${t.name}</div><div class="div-meta">${t.members.length} members · ${t.projectsCompleted} projects · Status: Active</div></div>`; });
  c.innerHTML+=`<div style="font-size:10px;color:var(--text-dim);margin-top:4px;text-align:center;">These divisions run independently.<br>No direct benefit — just like real Star Labs!</div>`;
}

// ==================== ACHIEVEMENTS ====================
function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{ if(!S.achievements.includes(a.id)&&a.check()){ S.achievements.push(a.id); showToast(`🏆 ${a.name}!`); addLog(`🏆 ${a.icon} ${a.name}`,'discovery'); } });
}
function toggleAchievements(){
  const ov=document.getElementById('ach-overlay');
  if(ov.style.display==='flex'){ ov.style.display='none'; return; }
  ov.style.display='flex'; renderAchievements();
}
function renderAchievements(){
  const l=document.getElementById('ach-list'); l.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{ const e=S.achievements.includes(a.id); l.innerHTML+=`<div class="ach-row${e?' earned':''}"><span>${e?a.icon:'🔒'}</span><div style="flex:1"><div style="font-size:12px;font-weight:600">${a.name}</div><div style="font-size:9px;color:var(--text-dim)">${a.desc}</div></div>${e?'<span style="color:#66bb6a">✓</span>':''}</div>`; });
  document.getElementById('ach-count').textContent=`${S.achievements.length}/20`;
}

// ==================== EVENTS ====================
let evTimer=null;
function scheduleEvent(){ if(evTimer)clearTimeout(evTimer); evTimer=setTimeout(triggerEvent,35000+Math.random()*55000); }
function triggerEvent(){
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  document.getElementById('event-title').textContent=ev.title; document.getElementById('event-desc').textContent=ev.desc;
  const cc=document.getElementById('event-choices'); cc.innerHTML='';
  ev.choices.forEach(ch=>{ const b=document.createElement('button'); b.textContent=ch.text; b.className=ch.good?'':'secondary'; b.onclick=()=>resolveEvent(ev,ch); cc.appendChild(b); });
  document.getElementById('event-overlay').style.display='flex';
}
function resolveEvent(ev,ch){
  document.getElementById('event-overlay').style.display='none'; S.eventsHandled++;
  if(ch.cost){ if(ch.cost.compute&&S.energy<ch.cost.compute){ addLog('Not enough compute!','danger'); scheduleEvent(); return; } if(ch.cost.funding&&S.credits<ch.cost.funding){ addLog('Not enough funding!','danger'); scheduleEvent(); return; } }
  if(ch.cost){ if(ch.cost.compute) S.energy-=ch.cost.compute; if(ch.cost.funding) S.credits-=ch.cost.funding; }
  if(ch.reward){ if(ch.reward.data) S.data+=ch.reward.data; if(ch.reward.funding) S.credits+=ch.reward.funding; if(ch.reward.extraModels){ for(let i=0;i<ch.reward.extraModels;i++){ const s=STAR_TYPES[Math.floor(Math.random()*12)]; if(!S.stars.find(x=>x.name===s.name)) S.stars.push(s); } } }
  addLog(ch.good?'Incident resolved!':'Incident bad outcome.',ch.good?'good':'danger'); scheduleEvent(); updateUI();
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; t.style.animation='none'; t.offsetHeight; t.style.animation='toastPop 2.5s forwards'; setTimeout(()=>t.style.display='none',2500); }
function addLog(msg,cls){ const l=document.getElementById('log-area'); const d=document.createElement('div'); d.className='log-entry '+(cls||''); d.textContent=msg; l.appendChild(d); setTimeout(()=>d.remove(),3500); if(l.children.length>6) l.firstChild.remove(); }

// ==================== MUSIC ====================
const bgm=document.getElementById('bgm'); bgm.volume=0.35;
function toggleMusic(){ const b=document.getElementById('music-btn'); if(bgm.paused){ bgm.play().catch(()=>{}); b.textContent='🔊'; }else{ bgm.pause(); b.textContent='🔇'; } }
document.addEventListener('click',()=>{ bgm.play().catch(()=>{}); },{once:true});

// ==================== GAME LOOP ====================
setInterval(()=>{
  S.tick++;
  let eGen=S.modules.gpu+S.modules.tpu*5; if(S.research.includes('unsupervised')) eGen+=3+Math.floor(S.modules.gpu*0.3); if(S.research.includes('neuromorphic')) eGen+=S.modules.tpu*5;
  S.energy=Math.max(0,S.energy+eGen);
  S.projects.forEach(p=>{ p.progress++; if(p.progress>=p.max) setTimeout(()=>completeProject(p),50); });
  if(S.tick%25===0) S.day++; if(S.tick%10===0) checkAchievements();
  if(S.currentAlien){ S.currentAlien.attackTimer+=1;
    if(S.currentAlien.attackTimer>=S.currentAlien.atkSpeed){ const dmg=Math.floor(S.currentAlien.damage*(1-S.modules.firewall*0.05)); S.stationHP=Math.max(0,S.stationHP-dmg); addLog(`💥 ${S.currentAlien.name} breached: ${dmg}dmg!`,'danger'); S.currentAlien.attackTimer=0;
      if(S.stationHP<=0){ addLog('💀 Systems compromised!','danger'); S.currentAlien=null; document.getElementById('combat-overlay').style.display='none'; S.credits=Math.floor(S.credits*0.5); S.data=Math.floor(S.data*0.5); S.stationHP=S.maxHP; scheduleAlien(); } }
    updateCombatUI();
  }
  if(S.currentAlien&&S.modules.laser>0){ S.currentAlien.hp-=S.modules.laser*5; if(S.currentAlien.hp<=0) defeatAlien(); }
  if(S.stationHP<S.maxHP&&S.modules.repair>0&&S.tick%5===0) S.stationHP=Math.min(S.maxHP,S.stationHP+S.modules.repair*3);
  updateUI();
},1000);

updateUI(); scheduleEvent(); scheduleAlien();
addLog('🏢 Welcome to Star Labs! Build your team.','good');
addLog('Click desks/monitors for bonus compute! 🖱️','');
</script>
</body>
